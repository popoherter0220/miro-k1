<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miro's English Adventure</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root { --main: #6c5ce7; --bg: #f1f2f6; --wrong: #ff7675; --correct: #55efc4; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background 0.4s; overflow: hidden; padding-top: env(safe-area-inset-top); }
        #box { width: 92%; max-width: 420px; background: white; padding: 20px; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border: 8px solid #a29bfe; position: relative; }
        .header { display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 18px; font-weight: bold; color: #636e72; }
        .lvl-badge { background: #6c5ce7; color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        .pic-frame { width: 100%; height: 260px; background: #fff; border-radius: 30px; margin-bottom: 15px; border: 4px dashed #dfe6e9; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer; }
        #q-img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
        #mic-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: var(--wrong); color: white; font-size: 40px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 6px 0 #d63031; position: relative; display: inline-flex; align-items: center; justify-content: center; }
        #mic-btn.active { background: var(--correct); box-shadow: 0 4px 0 #00b894; transform: translateY(4px); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(85, 239, 196, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(85, 239, 196, 0); } 100% { box-shadow: 0 0 0 0 rgba(85, 239, 196, 0); } }
        #msg { margin-top: 5px; font-size: 22px; font-weight: bold; min-height: 50px; line-height: 1.2; }
        .star { position: absolute; pointer-events: none; font-size: 30px; animation: fly 1s forwards; z-index: 99; }
        @keyframes fly { 0% { transform: translate(-50%,-50%) scale(1); opacity:1; } 100% { transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(2); opacity:0; } }
        #start-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(108, 92, 231, 0.98); border-radius: 32px; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; cursor: pointer; text-align: center; padding: 20px; }
    </style>
</head>
<body id="bg">
<div id="box">
    <div id="start-overlay" onclick="initGame()">
        <span style="font-size: 60px;">🏰</span>
        <h2 id="overlay-title">Miro 的英語大冒險</h2>
        <p id="overlay-desc">點擊開始第一關</p>
    </div>

    <div class="header">
        <div class="lvl-badge">Level <span id="lvl">1</span></div>
        <div>⭐ <span id="s">0</span></div>
        <div style="font-size: 14px;">進度 <span id="c">0</span>/150</div>
    </div>
    
    <div class="pic-frame" onclick="spkCurrent()"><img id="q-img" src=""></div>
    <div style="color:#6c5ce7; font-weight:bold; margin-bottom:10px;" id="st">按下 🎤 說說看</div>
    <button id="mic-btn" onclick="startListen()">🎤</button>
    <div id="msg"></div>
</div>

<script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }

    const allWords = ["Apple", "Ant", "Alligator", "Arrow", "Anchor", "Ambulance", "Bed", "Book", "Banana", "Bear", "Bicycle", "Boat", "Butterfly", "Cake", "Camel", "Can", "Car", "Carrot", "Cat", "Coat", "Cup", "Deer", "Dice", "Dog", "Doll", "Dolphin", "Doughnut", "Drum", "Egg", "Eggplant", "Elbow", "Elephant", "Envelope", "Fan", "Feather", "Fish", "Flower", "Fork", "Frog", "Ghost", "Glass", "Glue", "Goat", "Gorilla", "Grapes", "Harp", "Hat", "Heart", "Hippo", "Holly", "Horse", "Igloo", "Iguana", "In", "Ink", "Insects", "Jacket", "Jacks", "Jellyfish", "Jigsaw puzzle", "Juggle", "Jump rope", "Kangaroo", "Keys", "King", "Kite", "Kitten", "Ladder", "Lollipop", "Leaf", "Light", "Lightning", "Lion", "Match", "Monkey", "Moon", "Mop", "Moose", "Mouse", "Nails", "Needle", "Nest", "Net", "Nine", "Notebook", "Oar", "Octopus", "Orange", "Ornament", "Ostrich", "Ox", "Paintbrush", "Peas", "Pencil", "Piano", "Pig", "Pizza", "Pumpkin", "Quail", "Queen", "Question", "Quilt", "Quiver", "Rabbit", "Rake", "Rhino", "Ring", "Rooster", "Rope", "Rose", "Scooter", "Sloth", "Snake", "Snail", "Snowman", "Spade", "Table", "Tiger", "Tree", "Truck", "Turtle", "Two", "Umbrella", "Umpire", "Under", "Underwear", "Vacuum", "Vase", "Vest", "Vine", "Violin", "Volcano", "Wagon", "Warm", "Watch", "Watermelon", "Whistle", "Window", "Wolf", "X-ray", "Yak", "Yam", "Yarn", "Yoga", "Yo-yo", "Zebra", "Zeppelin", "Zipper", "Zither", "Zucchini"];
    
    // SRS 複習機制：答錯的單字會存入此清單，並提高出現頻率
    let masterList = [...allWords];
    let reviewQueue = []; 
    let currentWord = "";
    let score = 0, totalSolved = 0, isRec = false;
    let levelSize = 10;

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = Recognition ? new Recognition() : null;
    if (rec) { rec.lang = 'en-US'; rec.maxAlternatives = 5; }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function initGame() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('start-overlay').style.display = 'none';
        nextQuestion();
    }

    function spk(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'en-US'; u.rate = 0.65;
        window.speechSynthesis.speak(u);
    }
    
    function spkCurrent() { spk(currentWord); }

    function startListen() {
        if(!rec) return alert("不支援語音");
        if(audioCtx.state === 'suspended') audioCtx.resume();
        if(isRec) return;
        rec.start(); isRec = true;
        document.getElementById('mic-btn').classList.add('active');
        document.getElementById('msg').innerHTML = "👂 正在聽...";
    }

    if (rec) {
        rec.onresult = (e) => {
            const hears = Array.from(e.results[0]).map(r => r.transcript.toLowerCase());
            const target = currentWord.toLowerCase();
            const body = document.getElementById('bg');
            
            // 寬鬆判定
            const ok = hears.some(h => h.includes(target) || target.includes(h) || (target.length > 3 && h.substring(0,3) === target.substring(0,3)));
            
            if (ok) {
                body.style.background = "#abf1da"; createStars();
                score += 10; totalSolved++;
                document.getElementById('s').textContent = score;
                document.getElementById('msg').innerHTML = `<span style="color:#20bf6b">很好！ ✨</span><br>${currentWord}`;
                setTimeout(() => spk(currentWord), 500);
                
                // 檢查是否過關
                if (totalSolved % levelSize === 0 && totalSolved > 0) {
                    setTimeout(showLevelUp, 2000);
                } else {
                    setTimeout(nextQuestion, 2500);
                }
            } else {
                body.style.background = "#ffcfcf";
                document.getElementById('msg').innerHTML = `<span style="color:#d63031">沒關係，再聽一次</span>`;
                setTimeout(() => spk(currentWord), 700);
                
                // 答錯邏輯：將單字加入複習隊列，讓它在 2 題後再次出現
                reviewQueue.push(currentWord);
                setTimeout(nextQuestion, 3500);
            }
        };
        rec.onend = () => { isRec = false; document.getElementById('mic-btn').classList.remove('active'); };
    }

    function nextQuestion() {
        document.getElementById('bg').style.background = "#f1f2f6";
        document.getElementById('msg').textContent = "";
        
        if (totalSolved >= 150) {
            document.getElementById('box').innerHTML = "<h1>🏆 全數破關！</h1><p>Miro 是英語小達人！</p>";
            return;
        }

        // 出題邏輯：30% 機率出複習題（如果隊列有人的話），70% 出新題
        if (reviewQueue.length > 0 && (Math.random() < 0.4 || masterList.length === 0)) {
            currentWord = reviewQueue.shift();
        } else {
            currentWord = masterList.shift();
        }

        const fix = { "Lollipop":"lallipop.jpg", "Moose":"mosse.jpg", "Snail":"snall.jpg", "Violin":"vlolin.jpg" };
        document.getElementById('q-img').src = fix[currentWord] || (currentWord.toLowerCase() + ".jpg");
        document.getElementById('c').textContent = totalSolved;
        document.getElementById('lvl').textContent = Math.floor(totalSolved / levelSize) + 1;
    }

    function showLevelUp() {
        const overlay = document.getElementById('start-overlay');
        const nextLvl = Math.floor(totalSolved / levelSize) + 1;
        document.getElementById('overlay-title').innerText = `🎉 恭喜通過第 ${nextLvl-1} 關！`;
        document.getElementById('overlay-desc').innerText = `點擊挑戰第 ${nextLvl} 關`;
        overlay.style.display = 'flex';
    }

    function createStars() {
        for (let i = 0; i < 15; i++) {
            const s = document.createElement('div'); s.className = 'star'; s.innerHTML = '⭐';
            s.style.left = '50%'; s.style.top = '50%';
            s.style.setProperty('--x', (Math.random()*600-300)+'px'); s.style.setProperty('--y', (Math.random()*600-300)+'px');
            document.body.appendChild(s); setTimeout(() => s.remove(), 1000);
        }
    }
</script>
</body>
</html>
